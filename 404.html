<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Speak AAC</title>
  <link rel="icon" type="image/png" href="icons/icon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e10; --surface: #1a1a1e; --border: #2a2a30;
      --text: #f0f0f0; --text-muted: #888; --gold: #c8841a; --gold-bright: #e09820;
      --radius: 10px;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f7f7f5; --surface: #ffffff; --border: #e0e0dc;
        --text: #1a1a1a; --text-muted: #666; --gold: #b87418; --gold-bright: #c8841a;
      }
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      gap: 0;
    }
    .logo {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      margin-bottom: 24px;
      opacity: 0.9;
    }
    .code {
      font-size: 5rem;
      font-weight: 900;
      color: var(--gold);
      line-height: 1;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }
    h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }
    p {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.6;
      max-width: 320px;
      margin-bottom: 32px;
    }
    .btn-home {
      background: var(--gold);
      color: #000;
      font-weight: 800;
      font-size: 0.9rem;
      padding: 12px 28px;
      border-radius: var(--radius);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      transition: opacity 0.15s;
    }
    .btn-home:hover { opacity: 0.85; }
    .btn-app {
      display: inline-block;
      margin-top: 14px;
      font-size: 0.82rem;
      color: var(--text-muted);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <img class="logo" src="icons/icon.png" alt="Speak" />
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>That page doesn't exist or may have moved. Try heading back to the home page.</p>
  <a class="btn-home" href="index.html">Back to Home</a>
  <a class="btn-app" href="app.html">Or go straight to the app →</a>
</body>
</html>
