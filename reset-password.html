<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Speak</title>
  <link rel="icon" type="image/png" href="icons/icon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0e0e0e;
      --surface:    #161616;
      --border:     #2a2a2a;
      --gold:       #C8922A;
      --text:       #f4f0ea;
      --text-muted: #9a8f80;
      --green:      #27ae60;
      --red:        #e05555;
      --radius:     14px;
      --radius-lg:  20px;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg:         #f4efe6;
        --surface:    #fffdf8;
        --border:     #ddd6c8;
        --gold:       #a36818;
        --text:       #1a1008;
        --text-muted: #5a4028;
        --green:      #1d7a44;
        --red:        #c0392b;
      }
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
    }

    .card img { width: 56px; height: 56px; border-radius: 14px; }
    .card h1 { font-size: 1.3rem; font-weight: 700; }
    .card p  { font-size: 0.9rem; color: var(--text-muted); line-height: 1.5; }

    input {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 1rem;
    }
    input:focus { outline: none; border-color: var(--gold); }

    button {
      width: 100%;
      padding: 13px;
      background: var(--gold);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: default; }

    #error-msg {
      font-size: 0.85rem;
      color: var(--red);
      display: none;
    }

    #success-msg {
      font-size: 0.95rem;
      color: var(--green);
      font-weight: 600;
      display: none;
    }

    #loading-msg { color: var(--text-muted); font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="card">
    <img src="icons/icon.png" alt="Speak" />
    <h1>Reset your password</h1>

    <p id="loading-msg">Verifying your link…</p>

    <div id="form-section" style="display:none; width:100%; display:flex; flex-direction:column; gap:12px;">
      <input type="password" id="new-password" placeholder="New password (min 6 characters)" autocomplete="new-password" />
      <input type="password" id="confirm-password" placeholder="Confirm new password" autocomplete="new-password" />
      <div id="error-msg"></div>
      <button id="submit-btn">Set New Password</button>
    </div>

    <div id="success-msg">✓ Password updated! Taking you back to the app…</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://ymljgpaublxjazfgcefz.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_q5cjUmE-5kcX81NZTwad1Q_VKxotAf5';
    const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const loadingMsg  = document.getElementById('loading-msg');
    const formSection = document.getElementById('form-section');
    const errorMsg    = document.getElementById('error-msg');
    const successMsg  = document.getElementById('success-msg');
    const submitBtn   = document.getElementById('submit-btn');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
    }

    // Supabase v2 fires PASSWORD_RECOVERY when user follows a reset link
    _sb.auth.onAuthStateChange(async (event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        loadingMsg.style.display = 'none';
        formSection.style.display = 'flex';
      }
    });

    // Fallback: if already in a recovery session on load
    (async () => {
      const { data: { session } } = await _sb.auth.getSession();
      if (session) {
        loadingMsg.style.display = 'none';
        formSection.style.display = 'flex';
      } else {
        // Wait 2s for onAuthStateChange, then show expired message
        setTimeout(() => {
          if (formSection.style.display === 'none' || !formSection.style.display) {
            loadingMsg.textContent = 'This link has expired or is invalid. Request a new one from the app.';
          }
        }, 2000);
      }
    })();

    submitBtn.addEventListener('click', async () => {
      const pw1 = document.getElementById('new-password').value;
      const pw2 = document.getElementById('confirm-password').value;
      errorMsg.style.display = 'none';

      if (pw1.length < 6) { showError('Password must be at least 6 characters.'); return; }
      if (pw1 !== pw2)    { showError("Passwords don't match."); return; }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Saving…';

      const { error } = await _sb.auth.updateUser({ password: pw1 });
      if (error) {
        showError(error.message || 'Something went wrong — try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Set New Password';
      } else {
        formSection.style.display = 'none';
        successMsg.style.display = 'block';
        setTimeout(() => { window.location.href = 'app.html'; }, 2000);
      }
    });
  </script>
</body>
</html>
